name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from action.yml
        id: version
        run: |
          # Extract version from branding or use tag-based versioning
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0")
          CURRENT=${LATEST_TAG#v}

          # Check if there are new commits since last tag
          COMMITS_SINCE=$(git log "${LATEST_TAG}..HEAD" --oneline 2>/dev/null | wc -l | tr -d ' ')

          if [ "$COMMITS_SINCE" = "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits since ${LATEST_TAG}, skipping release"
          else
            # Bump patch version
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            MAJOR=${MAJOR:-1}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}
            NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Releasing v${NEW} (${COMMITS_SINCE} new commits since ${LATEST_TAG})"
          fi

      - name: Update major version tag
        if: steps.version.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)

          # Create version tag
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          # Move major version tag (v1 → latest)
          git tag -f "v${MAJOR}"
          git push -f origin "v${MAJOR}"

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Generate changelog from commits since last release
          PREV_TAG=$(git describe --tags --abbrev=0 "v${VERSION}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..v${VERSION}" --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
          fi

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "## Changes

${CHANGES}

## Usage

\`\`\`yaml
- uses: WebNaresh/bun-setup-action@v${VERSION%%.*}
  with:
    bun-version: '1.3.7'
\`\`\`"
