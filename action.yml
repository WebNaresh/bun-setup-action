name: 'Bun Setup with Install'
description: 'Setup Bun and install dependencies in one step'
branding:
  icon: 'package'
  color: 'orange'

inputs:
  bun-version:
    description: 'Bun version to install'
    required: false
    default: 'latest'
  working-directory:
    description: 'Working directory for bun install'
    required: false
    default: '.'
  frozen-lockfile:
    description: 'Use --frozen-lockfile flag'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ inputs.frozen-lockfile }}" = "true" ]; then
          bun install --frozen-lockfile
        else
          bun install
        fi
